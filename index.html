<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hand Control WebApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
            z-index: 2;
        }

        /* ---------- HUD ---------- */
        #hud {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #status {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            transition: opacity 0.3s;
            border: 1px solid rgba(255,255,255,0.08);
        }

        #hud-left {
            position: absolute;
            bottom: 24px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #hud-right {
            position: absolute;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hud-badge {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 8px 14px;
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hud-badge .label {
            opacity: 0.5;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .hud-badge .value {
            font-weight: 600;
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green { background: #22c55e; }
        .dot.red { background: #ef4444; }
        .dot.yellow { background: #eab308; }

        /* ---------- Gesture toast ---------- */
        #gesture-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 0.15s, transform 0.2s;
            pointer-events: none;
            z-index: 15;
            text-align: center;
        }
        #gesture-toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #gesture-toast .sub {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* ---------- Controls (pointer-events: auto) ---------- */
        #fs-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            pointer-events: auto;
            z-index: 20;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #fs-toggle:hover { background: rgba(255,255,255,0.15); }

        #connector-toggle {
            position: absolute;
            top: 64px;
            right: 16px;
            pointer-events: auto;
            z-index: 20;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            width: 40px;
            height: 40px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #connector-toggle:hover { background: rgba(255,255,255,0.15); }
        #connector-toggle.connected { border-color: #22c55e; }

        /* ---------- Cursor ---------- */
        #cursor-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #fff, #00aaff);
            box-shadow: 0 0 20px rgba(0,170,255,0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 8;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #cursor-dot.active { opacity: 1; }
        #cursor-dot.clicking {
            animation: click-pop 0.2s ease;
        }
        @keyframes click-pop {
            0%   { transform: translate(-50%,-50%) scale(1); }
            50%  { transform: translate(-50%,-50%) scale(1.6); opacity: 0.8; }
            100% { transform: translate(-50%,-50%) scale(1); }
        }

        @media (prefers-reduced-motion: reduce) {
            #gesture-toast, #cursor-dot { transition: none; animation: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="overlay"></canvas>

    <!-- cursor dot -->
    <div id="cursor-dot"></div>

    <!-- HUD -->
    <div id="hud">
        <div id="status">Loading MediaPipe…</div>
        <div id="hud-left">
            <div class="hud-badge"><span class="label">FPS</span> <span class="value" id="fps-val">0</span></div>
            <div class="hud-badge"><span class="label">GESTURE</span> <span class="value" id="gesture-val">—</span></div>
        </div>
        <div id="hud-right">
            <div class="hud-badge">
                <span class="dot" id="bridge-dot"></span>
                <span class="label">BRIDGE</span>
                <span class="value" id="bridge-val">Disconnected</span>
            </div>
            <div class="hud-badge">
                <span class="dot green" id="tracking-dot"></span>
                <span class="label">TRACKING</span>
                <span class="value" id="tracking-val">Ready</span>
            </div>
        </div>
    </div>

    <!-- Gesture toast -->
    <div id="gesture-toast"></div>

    <!-- Controls -->
    <button id="fs-toggle" title="Toggle Fullscreen">⛶</button>
    <button id="connector-toggle" title="Reconnect Bridge">⟳</button>
</div>

<!-- MediaPipe CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
(function () {
    'use strict';

    // ---- DOM refs ----
    const video     = document.getElementById('webcam');
    const overlay   = document.getElementById('overlay');
    const ctx       = overlay.getContext('2d');
    const statusEl  = document.getElementById('status');
    const fpsVal    = document.getElementById('fps-val');
    const gestureVal= document.getElementById('gesture-val');
    const bridgeDot = document.getElementById('bridge-dot');
    const bridgeVal = document.getElementById('bridge-val');
    const trackDot  = document.getElementById('tracking-dot');
    const trackVal  = document.getElementById('tracking-val');
    const toast     = document.getElementById('gesture-toast');
    const cursorDot = document.getElementById('cursor-dot');
    const fsBtn     = document.getElementById('fs-toggle');
    const connBtn   = document.getElementById('connector-toggle');

    // ---- State ----
    let ws               = null;
    let wsReconnectTimer = null;
    let lastSend         = 0;
    const SEND_INTERVAL  = 30;   // ms between bridge sends
    const WS_PORT        = 8124;

    // Smooth cursor
    let smoothX = 0.5, smoothY = 0.5;
    let cursorVisible = false;

    // Gesture state
    let currentGesture = '—';
    let gestureToastTimer = null;

    // FPS tracking
    let frameCount = 0;
    let fpsTime    = performance.now();
    let fps        = 0;

    // ---- Helpers ----
    function showToast(text, sub) {
        toast.innerHTML = text + (sub ? `<div class="sub">${sub}</div>` : '');
        toast.classList.add('show');
        clearTimeout(gestureToastTimer);
        gestureToastTimer = setTimeout(() => toast.classList.remove('show'), 800);
    }

    function setBridgeStatus(connected) {
        bridgeDot.className = `dot ${connected ? 'green' : 'red'}`;
        bridgeVal.textContent = connected ? 'Connected' : 'Disconnected';
        connBtn.classList.toggle('connected', connected);
    }

    function setTrackingStatus(active) {
        trackDot.className = `dot ${active ? 'green' : 'yellow'}`;
        trackVal.textContent = active ? 'Active' : 'Waiting…';
    }

    function smoothCursor(targetX, targetY) {
        const factor = 0.35;
        smoothX += (targetX - smoothX) * factor;
        smoothY += (targetY - smoothY) * factor;
        const w = window.innerWidth;
        const h = window.innerHeight;
        cursorDot.style.left = (smoothX * w) + 'px';
        cursorDot.style.top  = (smoothY * h) + 'px';
    }

    // ---- WebSocket bridge ----
    function connectWS() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
        try {
            ws = new WebSocket(`ws://127.0.0.1:${WS_PORT}`);
        } catch (e) {
            setBridgeStatus(false);
            scheduleReconnect();
            return;
        }
        ws.onopen = () => {
            setBridgeStatus(true);
            clearTimeout(wsReconnectTimer);
            showToast('Bridge Connected', 'Ctrl+Click = right click');
        };
        ws.onclose = () => {
            setBridgeStatus(false);
            scheduleReconnect();
        };
        ws.onerror = () => { ws.close(); };
    }

    function scheduleReconnect() {
        clearTimeout(wsReconnectTimer);
        wsReconnectTimer = setTimeout(connectWS, 3000);
    }

    function sendToBridge(type, data) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const now = performance.now();
        if (now - lastSend < SEND_INTERVAL) return;
        lastSend = now;
        try {
            ws.send(JSON.stringify({ type, ...data }));
        } catch (_) {}
    }

    connBtn.addEventListener('click', () => {
        if (ws) { try { ws.close(); } catch (_) {} }
        connectWS();
    });

    // ---- Fullscreen ----
    function toggleFS() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen().catch(() => {});
        }
    }
    fsBtn.addEventListener('click', toggleFS);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'f' || e.key === 'F') toggleFS();
    });

    // ---- Gesture Detection ----
    function calcDistance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z || 0);
    }

    function isOpenPalm(landmarks) {
        // All fingertips far from palm center = open hand
        const wrist  = landmarks[0];
        const tips   = [4, 8, 12, 16, 20];
        const far    = tips.filter(i => calcDistance(wrist, landmarks[i]) > 0.12);
        return far.length >= 4;
    }

    function isPinch(thumb, index) {
        return calcDistance(thumb, index) < 0.06;
    }

    function isFist(landmarks) {
        const tips = [8, 12, 16, 20]; // index, middle, ring, pinky
        const palm = landmarks[9];     // middle finger MCP
        const allBent = tips.every(i => calcDistance(palm, landmarks[i]) < 0.12);
        // Also check thumb is tucked
        const thumbBent = calcDistance(palm, landmarks[4]) < 0.12;
        return allBent && thumbBent;
    }

    let prevCenterX = null;
    let swipeCooldown = 0;

    function detectSwipe(landmarks) {
        const wrist = landmarks[0];
        const cx = wrist.x;
        if (prevCenterX === null) { prevCenterX = cx; return null; }
        const dx = cx - prevCenterX;
        prevCenterX = cx;
        const now = performance.now();
        if (now < swipeCooldown) return null;
        if (Math.abs(dx) > 0.015) {
            swipeCooldown = now + 400;
            return dx > 0 ? 'swipe_right' : 'swipe_left';
        }
        return null;
    }

    let lastClickTime = 0;
    const CLICK_COOLDOWN = 400;

    function detectClick(landmarks) {
        const thumb = landmarks[4];
        const index = landmarks[8];
        const middle = landmarks[12];

        // Right-click: thumb + middle pinch
        if (calcDistance(thumb, middle) < 0.05) {
            const now = performance.now();
            if (now - lastClickTime > CLICK_COOLDOWN * 2) {
                lastClickTime = now;
                return 'right';
            }
        }
        // Left-click: thumb + index pinch
        if (isPinch(thumb, index)) {
            const now = performance.now();
            if (now - lastClickTime > CLICK_COOLDOWN) {
                lastClickTime = now;
                return 'left';
            }
        }
        return null;
    }

    // ---- Drawing ----
    function drawHand(landmarks, isLeft) {
        const w = overlay.width;
        const h = overlay.height;
        const color = isLeft ? '#22c55e' : '#00ccff';

        // Connections
        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(2, Math.min(4, Math.min(w, h) / 300));
        const connections = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],
            [0,17],[17,18],[18,19],[19,20],
            [0,5],[5,9],[9,13],[13,17]
        ];
        connections.forEach(([i, j]) => {
            ctx.beginPath();
            ctx.moveTo(landmarks[i].x * w, landmarks[i].y * h);
            ctx.lineTo(landmarks[j].x * w, landmarks[j].y * h);
            ctx.stroke();
        });

        // Landmark dots
        const r = Math.max(3, Math.min(7, Math.min(w, h) / 250));
        landmarks.forEach((lm, idx) => {
            ctx.fillStyle = (idx === 4 || idx === 8) ? '#ff4444' : color;
            ctx.beginPath();
            ctx.arc(lm.x * w, lm.y * h, r, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    // ---- Cursor from index finger ----
    function getCursorPos(landmarks) {
        const index = landmarks[8];
        return { x: index.x, y: index.y };
    }

    // ---- Main processing ----
    function onResults(results) {
        ctx.clearRect(0, 0, overlay.width, overlay.height);

        // Sync canvas size
        if (overlay.width !== window.innerWidth || overlay.height !== window.innerHeight) {
            overlay.width = window.innerWidth;
            overlay.height = window.innerHeight;
        }

        // FPS
        frameCount++;
        const now = performance.now();
        if (now - fpsTime >= 1000) {
            fps = frameCount;
            fpsVal.textContent = fps;
            frameCount = 0;
            fpsTime = now;
        }

        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            statusEl.textContent = 'No hands detected';
            setTrackingStatus(false);
            cursorDot.classList.remove('active');
            currentGesture = '—';
            gestureVal.textContent = '—';
            prevCenterX = null;
            return;
        }

        setTrackingStatus(true);
        const handCount = results.multiHandLandmarks.length;
        statusEl.textContent = handCount === 1 ? '1 hand' : `${handCount} hands`;

        // Track which hand is which
        let rightLandmarks = null;
        let leftLandmarks  = null;
        let rightIndex     = -1;
        let leftIndex      = -1;

        for (let i = 0; i < handCount; i++) {
            const lm = results.multiHandLandmarks[i];
            const handedness = results.multiHandedness[i].label;
            drawHand(lm, handedness === 'Left');
            if (handedness === 'Right') { rightLandmarks = lm; rightIndex = i; }
            else { leftLandmarks = lm; leftIndex = i; }
        }

        // Use the RIGHT hand for cursor control (mirrored — index finger)
        const controlHand = rightLandmarks || leftLandmarks;
        if (controlHand) {
            const pos = getCursorPos(controlHand);
            smoothCursor(pos.x, pos.y);
            cursorDot.classList.add('active');

            // Detect gestures
            const clickType = detectClick(controlHand);

            // Send to bridge continuously
            sendToBridge('cursor', { x: smoothX, y: smoothY });

            if (clickType === 'left') {
                showToast('🖱️ Click', 'Left');
                sendToBridge('click', { button: 'left' });
                cursorDot.classList.add('clicking');
                setTimeout(() => cursorDot.classList.remove('clicking'), 200);
                currentGesture = 'Click';
            } else if (clickType === 'right') {
                showToast('🖱️ Right Click', 'Secondary');
                sendToBridge('click', { button: 'right' });
                currentGesture = 'Right Click';
            } else if (isOpenPalm(controlHand)) {
                currentGesture = 'Open Palm ⚡';
                sendToBridge('open_palm', {});
            } else if (isFist(controlHand)) {
                currentGesture = 'Fist ✊';
                sendToBridge('fist', {});
            } else {
                const swipe = detectSwipe(controlHand);
                if (swipe) {
                    currentGesture = swipe === 'swipe_left' ? 'Swipe ←' : 'Swipe →';
                    showToast(currentGesture);
                    sendToBridge('swipe', { direction: swipe === 'swipe_left' ? 'left' : 'right' });
                } else {
                    currentGesture = 'Tracking';
                }
            }

            // Drag: pinch + hold (thumb+index held for 200ms+)
            // Handled by the click state machine above
        }

        gestureVal.textContent = currentGesture;

        // Update cursor dot position text
        if (controlHand && handCount > 0) {
            // Also send hand state periodically
        }
    }

    // ---- Init ----
    async function init() {
        statusEl.textContent = 'Requesting camera…';
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: 'user' }
            });
        } catch (e) {
            statusEl.textContent = 'Camera access denied';
            showToast('🔒 Camera Required', 'Allow camera access and reload');
            return;
        }
        video.srcObject = stream;
        await new Promise(r => { video.onloadedmetadata = r; });

        overlay.width = window.innerWidth;
        overlay.height = window.innerHeight;

        statusEl.textContent = 'Initializing MediaPipe…';

        const hands = new Hands({
            locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        await hands.initialize();
        statusEl.textContent = 'Tracking ready — show your hand';

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 1920, height: 1080
        });
        camera.start();

        connectWS();

        // Resize handler
        window.addEventListener('resize', () => {
            overlay.width = window.innerWidth;
            overlay.height = window.innerHeight;
        });
    }

    // Detect when browser enters/leaves fullscreen
    document.addEventListener('fullscreenchange', () => {
        fsBtn.textContent = document.fullscreenElement ? '⛶' : '⛶';
        if (!document.fullscreenElement) {
            showToast('⛶ Exited Fullscreen', 'Press F to re-enter');
        }
    });

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
