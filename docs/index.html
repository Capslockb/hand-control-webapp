<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation — Tony Stark Hand Control</title>
  <meta name="theme-color" content="#0b0d10">
  <style>
    :root {
      --bg: #0b0d10; --bg-2: #11151a; --fg: #e6e8eb;
      --muted: #8b95a3; --accent: #ff5a1f; --accent-2: #ffb000;
      --green: #2ecc71; --border: #1f262e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 48px 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image: url("../assets/grain.png");
      background-repeat: repeat; background-size: 120px 120px; opacity: 0.18;
    }
    a { color: var(--accent); }
    a:hover { text-decoration: none; }
    h1 { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
    h1 .glow { background: linear-gradient(90deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .back { display: inline-block; margin-bottom: 24px; color: var(--muted); font-size: 14px; }
    .back:hover { color: var(--fg); }
    hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .meta { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    #content { line-height: 1.7; }
    #content h1, #content h2, #content h3 { margin-top: 28px; margin-bottom: 12px; font-weight: 700; }
    #content h1 { font-size: 28px; }
    #content h2 { font-size: 22px; color: var(--accent-2); }
    #content h3 { font-size: 18px; }
    #content p { margin: 12px 0; }
    #content code { background: var(--bg-2); padding: 2px 6px; border-radius: 4px; font-size: 14px; }
    #content pre { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; overflow-x: auto; margin: 16px 0; }
    #content pre code { background: none; padding: 0; }
    #content img { max-width: 100%; border-radius: 10px; border: 1px solid var(--border); margin: 16px 0; }
    #content ul, #content ol { padding-left: 24px; margin: 12px 0; }
    #content li { margin: 4px 0; }
    #content blockquote { border-left: 3px solid var(--accent); padding-left: 16px; color: var(--muted); margin: 16px 0; }
    #content table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    #content th, #content td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
    #content th { background: var(--bg-2); font-weight: 600; }

    .doc-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-top: 24px; }
    .doc-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-decoration: none; color: var(--fg); transition: border-color 0.2s; }
    .doc-card:hover { border-color: var(--accent); }
    .doc-card h3 { font-size: 16px; margin-bottom: 4px; }
    .doc-card p { font-size: 13px; color: var(--muted); }
    #loading { color: var(--muted); text-align: center; padding: 60px 0; }
    #error { color: #e74c3c; text-align: center; padding: 60px 0; }
    #error a { color: var(--accent); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; border: 1px solid var(--border); cursor: pointer; text-decoration: none; color: var(--fg); background: var(--bg-2); }
    .btn-primary { background: var(--accent); color: #0b0d10; border-color: var(--accent); }
    .btn-primary:hover { filter: brightness(1.05); }
    .error-card { background: rgba(231,76,60,0.06); border: 1px solid rgba(231,76,60,0.25); border-radius: 12px; padding: 20px; margin-top: 24px; }
    .error-card h3 { color: #e74c3c; }
    @media (max-width: 600px) { body { padding: 24px 16px; } h1 { font-size: 26px; } }

    /* TOC */
    #toc { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin: 16px 0; }
    #toc h3 { margin: 0 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    #toc a { display: block; font-size: 14px; padding: 2px 0; }
  </style>
</head>
<body>
  <a class="back" href="../">← Back to Tony Stark Hand Control</a>
  <h1><span class="glow">Documentation</span></h1>

  <div id="content">
    <p class="meta" style="margin-bottom: 0;">Select a guide below, or use the nav links from the main site.</p>
    <div class="doc-list" id="doc-list"></div>
  </div>

  <script>
    const DOCS = [
      {file: 'installation', title: '📦 Installation', desc: 'Step-by-step install for Windows, Linux, and macOS.'},
      {file: 'architecture', title: '🏗️ Architecture', desc: 'How the four layers of the app work together.'},
      {file: 'calibration', title: '📐 Calibration', desc: 'Stereo camera calibration with checkerboard.'},
      {file: 'gestures', title: '✋ Gestures', desc: 'All supported gestures and their keyboard mappings.'},
      {file: '3d_room_mapping', title: '🗺️ 3D Room Mapping', desc: 'How the 3D room mapping and triangulation works.'},
      {file: 'performance', title: '⚡ Performance', desc: 'Benchmarks, FPS targets, and optimization tips.'},
      {file: 'ollama_integration', title: '🤖 Ollama Integration', desc: 'Optional AI-powered gesture recognition via local LLMs.'},
      {file: 'troubleshooting', title: '🔧 Troubleshooting', desc: 'Common issues and their solutions.'},
      {file: 'test_results', title: '📊 Test Results', desc: 'Validation results across different hardware.'}
    ];

    const list = document.getElementById('doc-list');
    DOCS.forEach(d => {
      const a = document.createElement('a');
      a.href = `?file=${d.file}`;
      a.className = 'doc-card';
      a.innerHTML = `<h3>${d.title}</h3><p>${d.desc}</p>`;
      list.appendChild(a);
    });

    // Check if a specific doc was requested
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (file) {
      loadDoc(file);
    }

    async function loadDoc(name) {
      const content = document.getElementById('content');
      content.innerHTML = '<div id="loading">Loading…</div>';

      // Try .md first, fall back to .html
      let md = null;
      try {
        const res = await fetch(`${name}.md`);
        if (res.ok) md = await res.text();
      } catch(_) {}

      if (!md) {
        content.innerHTML = '<div id="error">Document not found. <a href="?">Browse all docs →</a></div>';
        return;
      }

      // Simple markdown to HTML renderer (no deps)
      const html = renderMarkdown(md);
      content.innerHTML = `
        <a class="back" href="?">← All Documentation</a>
        ${html}
      `;
      document.title = `${capitalize(name.replace(/_/g, ' '))} — Documentation`;
    }

    function capitalize(s) {
      return s.replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderMarkdown(md) {
      let html = md
        // Code blocks
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
          return `<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`;
        })
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Headers
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Bold + italic
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        // Images
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
        // Horizontal rules
        .replace(/^---$/gm, '<hr>')
        // Blockquotes
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        // Unordered lists
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
        // Ordered lists
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        // Fix consecutive <li> wrapped in single <ul>
        .replace(/(<li>.*<\/li>)\n<li>/g, '$1\n<li>')
        // Paragraphs (catch remaining text)
        .replace(/^(?!<[hul]|<pre|<bl|$)(.+)$/gm, '<p>$1</p>');

      // Clean up empty paragraphs
      html = html.replace(/<p><\/p>/g, '');
      // Fix nested paragraphs in list items
      html = html.replace(/<li><p>/g, '<li>').replace(/<\/p><\/li>/g, '</li>');
      return html;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
